  title: "The World According to LLMs: How Geographic Origin Influences LLMs' Entity Deduction Capabilities"
  paper_url: "/papers/worldllms/"
  description: Evaluating implicit geographic bias in LLMs through a multi-turn entity deduction game. Used notable people and culturally significant objects from diverse regions as entities, and investigated the effect of pre-training frequency and popularity on deduction.
  status: Presented at COLM 2025.

